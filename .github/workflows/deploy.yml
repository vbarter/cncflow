name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run tests
        run: cd backend && pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 107.173.154.11 >> ~/.ssh/known_hosts
      - name: Deploy to server
        # 先同步代码再执行部署脚本，保证跑的是本次 push 的最新 deploy.sh
        run: |
          ssh -i ~/.ssh/deploy_key root@107.173.154.11 \
            'cd /root/dev/cncflow && git fetch origin main && git reset --hard origin/main && bash deploy/deploy.sh'
